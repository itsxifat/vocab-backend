# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vocab.enfinito.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vocab.enfinito.cloud;

    # SSL — obtain with: certbot --nginx -d vocab.enfinito.cloud
    ssl_certificate     /etc/letsencrypt/live/vocab.enfinito.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocab.enfinito.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    client_max_body_size 10G;   # allow large Wiktionary uploads

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support for admin panel live job updates
        proxy_buffering    off;
        proxy_read_timeout 86400s;
    }
}
