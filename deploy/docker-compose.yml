services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vocab
    networks:
      - vocab_net

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env.production
    ports:
      - "127.0.0.1:3008:3008"
    depends_on:
      - mongo
    networks:
      - vocab_net

volumes:
  mongo_data:

networks:
  vocab_net:
